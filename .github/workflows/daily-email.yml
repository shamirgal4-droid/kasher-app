name: Daily task email

# רץ אוטומטית פעמיים ביום (שעון UTC — ישראל פחות 3 בקיץ).
# מכוונים לכמה דקות אחרי השעה העגולה (07 במקום 00) כי GitHub עמוס בשעה עגולה
# ומעכב/מדלג — כמה דקות אחרי זה הרבה יותר אמין:
#   04:07 UTC ≈ 07:07 בישראל (קיץ) — מייל הבוקר עם הרשימה המלאה
#   16:07 UTC ≈ 19:07 בישראל (קיץ) — תזכורת הערב
# בחורף (UTC+2) שני ל-'7 5 * * *' ו-'7 17 * * *'.
on:
  schedule:
    - cron: "7 4 * * *"
    - cron: "7 16 * * *"
  # כפתור להרצה ידנית מיידית (Actions -> Daily task email -> Run workflow)
  workflow_dispatch:
    inputs:
      mode:
        description: "morning (רשימה מלאה) או reminder (רק מה שקבוע לשעה)"
        default: "morning"

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          if [ "${{ github.event.schedule }}" = "7 16 * * *" ]; then
            MODE=reminder
          else
            MODE="${{ github.event.inputs.mode || 'morning' }}"
          fi
          echo "Sending in mode: $MODE"
          python tasks_email.py "$MODE"
