name: Daily task email

# רץ אוטומטית פעמיים ביום (שעון UTC — ישראל פחות 3 בקיץ):
#   05:00 UTC = 08:00 בישראל (קיץ) — מייל הבוקר עם הרשימה המלאה
#   16:00 UTC = 19:00 בישראל (קיץ) — תזכורת הערב על מה שקבוע לשעה
# בחורף (UTC+2) שני ל-'0 6 * * *' ו-'0 17 * * *' כדי לשמור על 08:00 ו-19:00.
on:
  schedule:
    - cron: "0 5 * * *"
    - cron: "0 16 * * *"
  # כפתור להרצה ידנית מיידית (Actions -> Daily task email -> Run workflow)
  workflow_dispatch:
    inputs:
      mode:
        description: "morning (רשימה מלאה) או reminder (רק מה שקבוע לשעה)"
        default: "morning"

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          if [ "${{ github.event.schedule }}" = "0 16 * * *" ]; then
            MODE=reminder
          else
            MODE="${{ github.event.inputs.mode || 'morning' }}"
          fi
          echo "Sending in mode: $MODE"
          python tasks_email.py "$MODE"
